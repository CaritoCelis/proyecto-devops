name: CI/CD Pipeline

on:
  push:
    branches: [deploy]

env:
  DOCKER_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  build-backend-ventas:
    name: Build & Push back1-ventas
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./back1-ventas
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/back1-ventas:latest
            ${{ env.DOCKER_USER }}/back1-ventas:v${{ github.run_number }}

  build-backend-despacho:
    name: Build & Push back2-despacho
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./back2-despacho
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/back2-despacho:latest
            ${{ env.DOCKER_USER }}/back2-despacho:v${{ github.run_number }}

  build-frontend:
    name: Build & Push front-despacho
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./front-despacho
          push: true
          tags: |
            ${{ env.DOCKER_USER }}/front-despacho:latest
            ${{ env.DOCKER_USER }}/front-despacho:v${{ github.run_number }}

  deploy-frontend:
    name: Deploy Frontend a EC2
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_FRONTEND_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest
            docker stop frontend-devops || true
            docker rm frontend-devops || true
            docker run -d \
              --name frontend-devops \
              --restart unless-stopped \
              -p 5173:5173 \
              ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest

  deploy-backend-a:
    name: Deploy Backend A a EC2
    runs-on: ubuntu-latest
    needs: build-backend-ventas
    steps:
      - name: Deploy via SSH Jump
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_BACKEND_A_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back1-ventas:latest
            docker stop backend-ventas || true
            docker rm backend-ventas || true
            docker run -d \
              --name backend-ventas \
              --restart unless-stopped \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/devops_ventas?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/back1-ventas:latest

  deploy-backend-b:
    name: Deploy Backend B a EC2
    runs-on: ubuntu-latest
    needs: build-backend-despacho
    steps:
      - name: Deploy via SSH Jump
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_BACKEND_B_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          proxy_host: ${{ secrets.EC2_FRONTEND_HOST }}
          proxy_username: ec2-user
          proxy_key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/back2-despacho:latest
            docker stop backend-despacho || true
            docker rm backend-despacho || true
            docker run -d \
              --name backend-despacho \
              --restart unless-stopped \
              -p 8081:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/devops_despacho?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true \
              -e DB_USERNAME=root \
              -e DB_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/back2-despacho:latest