name: CI/CD Pipeline → AWS ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

jobs:

  build-and-push:
    name: Build & Push imágenes → ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build y push back1-ventas
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/back1-ventas:latest ./back1-ventas
          docker push ${{ env.ECR_REGISTRY }}/back1-ventas:latest

      - name: Build y push back2-despacho
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/back2-despacho:latest ./back2-despacho
          docker push ${{ env.ECR_REGISTRY }}/back2-despacho:latest

      - name: Build y push front-despacho
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/front-despacho:latest ./front-despacho
          docker push ${{ env.ECR_REGISTRY }}/front-despacho:latest

  deploy:
    name: Deploy → ECS Fargate
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy back1-ventas en ECS
        run: |
          aws ecs update-service \
            --cluster cluster-devops \
            --service svc-back1-ventas \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy back2-despacho en ECS
        run: |
          aws ecs update-service \
            --cluster cluster-devops \
            --service svc-back1-despacho \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy front-despacho en ECS
        run: |
          aws ecs update-service \
            --cluster cluster-devops \
            --service svc-front-despacho \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}