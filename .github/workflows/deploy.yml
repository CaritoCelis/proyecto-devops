name: CI/CD Pipeline → AWS EKS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  EKS_CLUSTER: cluster-devops

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Build + Push back1-ventas a ECR
  # ─────────────────────────────────────────
  build-backend-ventas:
    name: Build & Push back1-ventas → ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push back1-ventas
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/back1-ventas:latest ./back1-ventas
          docker push ${{ env.ECR_REGISTRY }}/back1-ventas:latest

  # ─────────────────────────────────────────
  # JOB 2: Build + Push back2-despacho a ECR
  # ─────────────────────────────────────────
  build-backend-despacho:
    name: Build & Push back2-despacho → ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push back2-despacho
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/back2-despacho:latest ./back2-despacho
          docker push ${{ env.ECR_REGISTRY }}/back2-despacho:latest

  # ─────────────────────────────────────────
  # JOB 3: Build + Push frontend a ECR
  # ─────────────────────────────────────────
  build-frontend:
    name: Build & Push front-despacho → ECR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag y push front-despacho
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/front-despacho:latest ./front-despacho
          docker push ${{ env.ECR_REGISTRY }}/front-despacho:latest

  # ─────────────────────────────────────────
  # JOB 4: Deploy todo a EKS
  # ─────────────────────────────────────────
  deploy:
    name: Deploy → EKS
    runs-on: ubuntu-latest
    needs: [build-backend-ventas, build-backend-despacho, build-frontend]
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Configurar kubectl para EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Reemplazar Account ID en manifiestos
        run: |
          sed -i "s|AWS_ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g" k8s/back1-ventas.yml
          sed -i "s|AWS_ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g" k8s/back2-despacho.yml
          sed -i "s|AWS_ACCOUNT_ID|${{ secrets.AWS_ACCOUNT_ID }}|g" k8s/front-despacho.yml

      - name: Deploy a EKS
        run: |
          kubectl apply -f k8s/back1-ventas.yml
          kubectl apply -f k8s/back2-despacho.yml
          kubectl apply -f k8s/front-despacho.yml
          kubectl apply -f k8s/hpa.yml

      - name: Forzar rollout con nueva imagen
        run: |
          kubectl rollout restart deployment/back1-ventas
          kubectl rollout restart deployment/back2-despacho
          kubectl rollout restart deployment/front-despacho

      - name: Verificar deploy
        run: |
          kubectl rollout status deployment/back1-ventas --timeout=120s
          kubectl rollout status deployment/back2-despacho --timeout=120s
          kubectl rollout status deployment/front-despacho --timeout=120s