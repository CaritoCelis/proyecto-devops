version: '3'

services:
  backend2:
    build: .
    container_name: backend2

    ports:
      - "8082:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql2:3306/db2
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    depends_on:
      - mysql2

    restart: always

  mysql2:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db2

    volumes:
      - mysql2_data:/var/lib/mysql

volumes:
  mysql2_data: