apiVersion: apps/v1
kind: Deployment
metadata:
  name: front-despacho
  labels:
    app: front-despacho
spec:
  replicas: 1
  selector:
    matchLabels:
      app: front-despacho
  template:
    metadata:
      labels:
        app: front-despacho
    spec:
      containers:
        - name: front-despacho
          image: AWS_ACCOUNT_ID.dkr.ecr.us-east-1.amazonaws.com/front-despacho:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "512Mi"
---
# LoadBalancer público para el frontend
apiVersion: v1
kind: Service
metadata:
  name: front-despacho
spec:
  selector:
    app: front-despacho
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer