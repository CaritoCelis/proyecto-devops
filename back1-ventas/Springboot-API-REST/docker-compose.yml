version: '3'

services:
  backend1:
    build: .
    container_name: backend1

    ports:
      - "8081:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql1:3306/db1
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    depends_on:
      - mysql1

  mysql1:
    image: mysql:8

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db1

    volumes:
      - mysql1_data:/var/lib/mysql

volumes:
  mysql1_data: